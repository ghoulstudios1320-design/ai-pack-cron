name: weekly-pack

on:
  workflow_dispatch:
  schedule:
    - cron: "0 14 * * 1"

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Sanitize OPENAI key
        env:
          RAW_OPENAI_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          echo "OPENAI_API_KEY=$(printf "%s" "$RAW_OPENAI_KEY" | tr -d '\r\n')" >> $GITHUB_ENV

      - name: Generate trucking pack
        run: python -m src.generate_trucking_pack
              python -m src.package_trucking_outputs

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: trucking-weekly-output
          path: output/
